<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emporium Beer House</title>

<link rel="icon" href="img/Logo.png">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="header-mobile">
  <img src="img/Logo.png" alt="Logo">

  <nav>
    <a href="index.html" class="ativo">Início</a>
    <a href="sobre.html">Sobre</a>
    <a href="catalogo.html">Catálogo</a>
  </nav>

  <button id="cart-btn" class="cart-modern">
    <i class="fa fa-shopping-cart"></i>
    <span id="cart-count">0</span>
  </button>
</header>

<main>

<section class="banner">
  <img src="img/Bannerprincipal.png">
</section>

<h2 class="titulo">Produtos Em Destaque</h2>

<section id="produtos" class="grid"></section>

<h2 class="titulo">📍 Nossa Localização</h2>

<section class="mapa">
  <iframe src="https://www.google.com/maps?q=Estrada+Lucinda+de+Jesus,57&output=embed"></iframe>
</section>

</main>

<footer>
  <div class="footer-left">© vitindev2026</div>

  <div class="footer-center hide-mobile">
    Sáb: 10h–00h | Dom: 10:30–17h | Seg: Fechado<br>
    Ter–Qui: 10h–22h | Sex: 10h–00h
  </div>

  <div class="footer-right">
    <a href="https://wa.me/5511943906039"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/emporium.beerhouse/"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/emporium.beerhouse/"><i class="fab fa-facebook"></i></a>
  </div>
</footer>

<div id="overlay"></div>

<div id="cart">
  <div class="cart-header">
    <h3>Seu Pedido</h3>
    <button id="close-cart">✖</button>
  </div>

  <ul id="cart-items"></ul>
  <h3 id="total">Total: R$ 0</h3>

  <div class="form">
    <input id="nome" placeholder="Seu nome">
    <select id="pagamento">
      <option>Pix</option>
      <option>Dinheiro</option>
      <option>Cartão</option>
    </select>
    <input id="horario" placeholder="Horário retirada">
  </div>

  <button class="btn-finalizar" onclick="finalizar()">Finalizar Pedido</button>
</div>

<script src="script.js"></script>
</body>
</html>
